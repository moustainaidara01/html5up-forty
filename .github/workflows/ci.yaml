name: CI/CD Pipeline - html5up-forty

on:
  push:
    branches:
      - main
      - trivy
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: html5up-forty
  DOCKER_USERNAME: aidara05

jobs:

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Création du Dockerfile
        run: |
          cat <<'EOF' > Dockerfile
          FROM nginx:alpine
          COPY . /usr/share/nginx/html
          RUN rm -f /etc/nginx/conf.d/default.conf
          RUN echo 'server { listen 80; root /usr/share/nginx/html; index index.html; location / { try_files $uri $uri/ =404; } }' > /etc/nginx/conf.d/default.conf
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: aidara05
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build de l'image Docker
        run: docker build -t aidara05/${{ env.IMAGE_NAME }}:latest .

      - name: Sauvegarde de l'image
        run: docker save aidara05/${{ env.IMAGE_NAME }}:latest -o /tmp/image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  scan-trivy:
    name: Security Scan - Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Téléchargement de l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Chargement de l'image
        run: docker load -i /tmp/image.tar

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aidara05/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload rapport Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  deploy:
    name: Deploy - Push Docker Hub
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - name: Téléchargement de l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Chargement de l'image
        run: docker load -i /tmp/image.tar

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: aidara05
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push sur Docker Hub
        run: docker push aidara05/${{ env.IMAGE_NAME }}:latest
